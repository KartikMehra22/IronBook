apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
configMapGenerator:
  - name: ironbook-profiles
    files:
      # Keys must match `[-._a-zA-Z0-9]+` (no slashes); the DaemonSet places
      # them at the correct host paths.
      - ironbook-sandbox.json=../../../policies/seccomp/ironbook-sandbox.json
      - ironbook-sandbox.apparmor=../../../policies/apparmor/ironbook-sandbox
generatorOptions:
  disableNameSuffixHash: true
resources:
  - daemonset.yaml
  - iptables-backstop.yaml
