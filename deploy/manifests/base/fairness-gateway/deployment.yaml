apiVersion: apps/v1
kind: Deployment
metadata:
  name: fairness-gateway
  namespace: submissions
  labels:
    app: fairness-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fairness-gateway
  template:
    metadata:
      labels:
        app: fairness-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ironbook/fairness-gateway:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: fairness-gateway
  namespace: submissions
spec:
  selector:
    app: fairness-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
