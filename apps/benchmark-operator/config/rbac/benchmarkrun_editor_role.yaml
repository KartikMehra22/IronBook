# This rule is not used by the project benchmark-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ironbook.ironbook.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: benchmark-operator
    app.kubernetes.io/managed-by: kustomize
  name: benchmarkrun-editor-role
rules:
- apiGroups:
  - ironbook.ironbook.io
  resources:
  - benchmarkruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ironbook.ironbook.io
  resources:
  - benchmarkruns/status
  verbs:
  - get
