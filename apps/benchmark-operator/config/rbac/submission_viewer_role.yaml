# This rule is not used by the project benchmark-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ironbook.ironbook.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: benchmark-operator
    app.kubernetes.io/managed-by: kustomize
  name: submission-viewer-role
rules:
- apiGroups:
  - ironbook.ironbook.io
  resources:
  - submissions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ironbook.ironbook.io
  resources:
  - submissions/status
  verbs:
  - get
