syntax = "proto3";
package ironbook.v1;
option go_package = "github.com/KartikMehra22/IronBook/pkg/proto/ironbook/v1;ironbookv1";

// Buf STANDARD lint requires every enum value to be prefixed with the enum
// name in SCREAMING_SNAKE_CASE.
enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BID         = 1;
  SIDE_ASK         = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT       = 1;
  ORDER_TYPE_MARKET      = 2;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_GTC         = 1;
  TIME_IN_FORCE_IOC         = 2;
  TIME_IN_FORCE_FOK         = 3;
}

message NormalizedOrder {
  uint64 platform_seq      = 1;
  uint64 platform_ts_ns    = 2;
  bytes  client_order_id   = 3; // u128 packed (bot_id, local_seq)
  bytes  session_token     = 4; // 32 bytes opaque
  Side   side              = 5;
  uint64 qty               = 6;
  int64  price             = 7; // ticks; integer math
  OrderType order_type     = 8;
  TimeInForce tif          = 9;
}

message Ack {
  uint64 platform_seq = 1;
  uint64 ack_ts_ns    = 2;
  uint32 status       = 3; // 0 = ok
  string message      = 4;
}

message Fill {
  uint64 trade_id            = 1;
  uint64 platform_seq_taker  = 2;
  uint64 platform_seq_maker  = 3;
  int64  price               = 4;
  uint64 qty                 = 5;
  uint64 ts_ns               = 6;
}
